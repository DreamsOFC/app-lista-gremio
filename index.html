<style>
  :root{ --bg:#faf8f4; --ink:#1c1b19; --muted:#7a756b; --line:#ece8e0; --card:#fff; --gold:#a8895c; --wa:#25D366; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.4}
  .num{font-family:'Space Grotesk',system-ui;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit}
  textarea{resize:vertical}
  a{text-decoration:none}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible,a:focus-visible{outline:2px solid #2f6fed;outline-offset:2px}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px}

  /* PICKER */
  .picker{max-width:520px;margin:0 auto;padding:48px 18px 40px}
  .picker h1{font-size:26px;font-weight:700;letter-spacing:-.01em;margin:0}
  .picker .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:4px}
  .picker .clube{font-size:13px;color:var(--muted);margin:4px 0 26px}
  .vcard{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;text-align:left;transition:box-shadow .15s,border-color .15s}
  .vcard:hover{box-shadow:0 2px 14px rgba(40,30,10,.06);border-color:#ddd5c6}
  .vcard .vn{font-size:17px;font-weight:700}
  .vcard .vp{font-size:12.5px;color:var(--muted);margin-top:2px}
  .vcard .arrow{color:var(--gold);font-size:20px}
  .vcard .prog{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-size:13px;color:#2a2823;font-weight:600;text-align:right}

  header.top{position:sticky;top:0;z-index:30;background:rgba(250,248,244,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .htop{padding:calc(env(safe-area-inset-top) + 12px) 14px 10px}
  .eyebrow{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .trocar{color:#9a958b;text-transform:none;letter-spacing:0;font-weight:600;font-size:11px;border-bottom:1px dotted #c9c3b6}
  .sync{font-size:10px;letter-spacing:.02em;text-transform:none;font-weight:600;padding:2px 7px;border-radius:99px}
  .sync.synced{background:#e3f5ea;color:#16703f}
  .sync.syncing{background:#e7effd;color:#1f4fb0}
  .sync.offline{background:#fbf1df;color:#8a5a12}
  .sync.local{background:#eceae6;color:#5f6368}
  h1.count{margin:1px 0 0;font-size:24px;font-weight:700;letter-spacing:-.01em}
  h1.count .of{color:#bdb6a8;font-weight:600}
  .sub{font-size:12.5px;color:var(--muted)}
  .topbtns{display:flex;gap:8px;margin-top:10px}
  .topbtns button{border-radius:10px;padding:9px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;justify-content:center;flex:1}
  .b-msg{background:#fff;border:1px solid #e6e1d7;color:#4a463f}
  .b-rep{background:var(--ink);color:#fff}
  .csvlink{display:block;text-align:center;font-size:11.5px;color:#9a958b;margin-top:8px;font-weight:600}
  .bar{display:flex;height:9px;border-radius:6px;overflow:hidden;background:var(--line);margin-top:12px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:9px}
  .legend .it{display:flex;align-items:center;gap:5px;font-size:12px;color:#6b6760}
  .legend .it b{font-weight:700;color:#2a2823}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block}
  .cfg{margin-top:12px;background:#fff;border:1px solid #e9e4da;border-radius:12px;padding:12px}
  .cfg .lbl{font-size:12.5px;font-weight:600;color:#4a463f;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .cfg textarea{width:100%;border:1px solid #e3ddd2;border-radius:8px;padding:9px 11px;font-size:13.5px;color:#2a2823}
  .cfg .hint{font-size:11.5px;color:#9a958b;margin-top:6px}
  .cfg code{background:#f1ede4;padding:1px 5px;border-radius:4px}
  .filters{padding:12px 14px 2px}
  .srch{position:relative;margin-bottom:10px}
  .srch input{width:100%;border:1px solid #e6e1d7;background:#fff;border-radius:10px;padding:11px 12px 11px 36px;font-size:14px}
  .srch svg{position:absolute;left:11px;top:12px;color:#b6b0a4}
  .row2{display:flex;gap:8px;margin-bottom:11px}
  .row2 select{flex:1;border:1px solid #e6e1d7;background:#fff;border-radius:10px;padding:10px 11px;font-size:13.5px;color:#4a463f}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
  .chip{display:flex;align-items:center;gap:6px;border-radius:99px;padding:7px 12px;font-size:12.5px;font-weight:600;background:#fff;color:#5a564e;border:1px solid #e6e1d7;white-space:nowrap;flex:0 0 auto}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip .dot{border-radius:99px;width:8px;height:8px}
  main{padding:8px 0 90px}
  .empty{text-align:center;padding:50px 20px;color:#9a958b;font-size:14px}
  .empty.done{color:#16703f}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;border-left:4px solid #9aa0a6;transition:opacity .25s ease, transform .25s ease}
  .card.leaving{opacity:0;transform:translateX(10px)}
  .chead{display:flex;flex-wrap:wrap;align-items:center;gap:7px}
  .nome{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
  .meta{display:flex;gap:13px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:#857f74}
  .meta span{display:flex;align-items:center;gap:4px}
  .meta .lista{color:#b3ada1}
  .warn{font-size:11.5px;color:#b1453b;font-weight:500;margin-top:10px}
  .tel{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:9px}
  .wa{display:flex;align-items:center;gap:7px;background:var(--wa);color:#fff;font-weight:700;font-size:14px;padding:11px 16px;border-radius:10px}
  .telnum{font-family:'Space Grotesk';font-variant-numeric:tabular-nums;font-size:14px;color:#3a372f;font-weight:500}
  .cpy{background:#f4f1ea;border:1px solid #e8e3d8;border-radius:8px;padding:7px 10px;font-size:12px;color:#6b6760;display:flex;align-items:center;gap:5px}
  .usado{font-size:11px;color:#16703f}
  .stbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:13px}
  .stbtn{border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:600;border:1px solid transparent}
  .noterow{margin-top:11px}
  .noteopen{background:none;border:none;font-size:12.5px;color:var(--gold);font-weight:600;padding:0}
  .noterow textarea{width:100%;border:1px solid var(--line);background:#fcfbf8;border-radius:9px;padding:9px 11px;font-size:13.5px;color:#2a2823}
  .upd{font-size:11px;color:#bdb6a8;margin-top:5px}
  .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 16px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 16px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50;display:flex;align-items:center;gap:12px;max-width:92vw}
  .toast.show{opacity:1;pointer-events:auto}
  .toast button{color:#ffd98a;font-weight:700;font-size:13px;white-space:nowrap}
</style>

// ---------------- sync ----------------
async function pullRemote(){
  if(!sb) return;
  try{
    const { data, error } = await sb.from("progresso").select("id,status,nota,tel_usado,atualizado");
    if(error) throw error;
    (data||[]).forEach(row=>{
      if(String(row.id).indexOf("__cfg__:")===0){ const key=String(row.id).slice(8); if(row.nota) cfgMsgs[key]=row.nota; return; }
      const cur=estado[row.id];
      if(!cur||!cur.atualizado||(row.atualizado||"")>=(cur.atualizado||"")){
        estado[row.id]={status:row.status||"novo",nota:row.nota||"",telUsado:row.tel_usado||"",atualizado:row.atualizado||null};
      }
    });
    saveLocal(); setSync("synced"); render();
  }catch(e){ setSync("offline"); }
}
async function pushRow(id){
  if(!sb) return;
  let payload;
  if(String(id).indexOf("__cfg__:")===0){ const key=id.slice(8); payload={id,status:null,nota:(cfgMsgs[key]!=null?cfgMsgs[key]:""),tel_usado:null,atualizado:nowISO()}; }
  else { const r=reg(id); payload={id,status:r.status,nota:r.nota||"",tel_usado:r.telUsado||null,atualizado:r.atualizado||nowISO()}; }
  setSync("syncing");
  try{ const {error}=await sb.from("progresso").upsert(payload); if(error) throw error; delete pending[id]; savePending(); if(Object.keys(pending).length===0)setSync("synced"); else flushPending(); }
  catch(e){ pending[id]=true; savePending(); setSync("offline"); }
}
async function flushPending(){ if(!sb)return; const ids=Object.keys(pending); if(!ids.length){setSync("synced");return;} for(const id of ids){ await pushRow(id); } }
function setSync(s){ syncState=s; const el=document.getElementById("syncpill"); if(el){ el.className="sync "+s; el.textContent=syncLabel(s);} }
function syncLabel(s){ if(s==="synced")return"● na nuvem"; if(s==="syncing")return"⟳ salvando…"; if(s==="offline")return"⚠ salvo no aparelho"; return"● só neste aparelho"; }

// ---------------- carregar contatos/vendedores do banco ----------------
async function fetchAll(table,cols,orderCol){
  let all=[]; const size=1000;
  for(let from=0;;from+=size){
    const {data,error}=await sb.from(table).select(cols).order(orderCol).range(from,from+size-1);
    if(error) throw error;
    all=all.concat(data||[]);
    if(!data||data.length<size) break;
  }
  return all;
}
async function carregarDoBanco(){
  if(!sb) return;
  try{
    const [vend,cont]=await Promise.all([ fetchAll("vendedores","slug,nome","slug"), fetchAll("contatos","*","id") ]);
    if(!vend.length && !cont.length) return; // banco vazio: mantém cache/semente
    const contatos={};
    for(const r of cont){
      (contatos[r.vendedor]=contatos[r.vendedor]||[]).push({
        id:r.id, matricula:r.matricula||"", nome:r.nome||"",
        telefones:(r.telefones||"").split(" | ").map(s=>s.trim()).filter(Boolean),
        email:r.email||"", cidade:r.cidade||"", vezes:r.vezes||"",
        data_entrada:r.data_entrada||"", data_eliminacao:r.data_eliminacao||"", lista:r.lista||"", campanha:r.campanha||"reativacao"
      });
    }
    FONTE={ vendedores:vend.map(v=>({slug:v.slug,nome:v.nome})), contatos };
    VENDEDORES=FONTE.vendedores;
    VMAP=Object.fromEntries(VENDEDORES.map(v=>[v.slug,v.nome]));
    CONTATOS=FONTE.contatos;
    salvarCache(FONTE);
    render();
  }catch(e){ /* sem rede / erro: mantém o que já está em memória (cache ou semente) */ }
}

// ---------------- indicados: sincronização ----------------
async function pushInd(id){
  if(!sb){ setSync("offline"); return; }
  const p=indPending[id]; if(!p) return;
  setSync("syncing");
  try{
    if(p.op==="del"){ const {error}=await sb.from("indicados").delete().eq("id",id); if(error) throw error; }
    else { const {error}=await sb.from("indicados").upsert(p.row); if(error) throw error; }
    delete indPending[id]; salvarIndPending();
    if(!Object.keys(indPending).length && !Object.keys(pending).length) setSync("synced"); else flushIndPending();
  }catch(e){ setSync("offline"); }
}
async function flushIndPending(){ if(!sb)return; for(const id of Object.keys(indPending)){ await pushInd(id); } }
function salvarIndicado(cid, indId, nome, telefone, obs){
  const vendedor=vendAtual;
  const arr=indicados[cid]||(indicados[cid]=[]);
  if(indId){ const it=arr.find(x=>x.id===indId); if(it){ it.nome=nome; it.telefone=telefone; it.observacao=obs; } else indId=null; }
  if(!indId){ indId=uuid(); arr.push({id:indId,contato_id:cid,vendedor,nome,telefone,observacao:obs}); }
  salvarIndLocal();
  indPending[indId]={op:"up",row:{id:indId,contato_id:cid,vendedor,nome,telefone,observacao:obs}}; salvarIndPending(); pushInd(indId);
}
function removerIndicado(cid, indId){
  indicados[cid]=(indicados[cid]||[]).filter(x=>x.id!==indId); salvarIndLocal();
  indPending[indId]={op:"del"}; salvarIndPending(); pushInd(indId);
}
async function carregarIndicados(){
  if(!sb) return;
  try{
    const rows=await fetchAll("indicados","*","criado_em");
    const map={};
    rows.forEach(r=>{ (map[r.contato_id]=map[r.contato_id]||[]).push({id:r.id,contato_id:r.contato_id,vendedor:r.vendedor,nome:r.nome||"",telefone:r.telefone||"",observacao:r.observacao||""}); });
    // reaplica pendências locais (não perder edições offline)
    Object.keys(indPending).forEach(id=>{ const p=indPending[id];
      Object.keys(map).forEach(cid=>{ map[cid]=map[cid].filter(x=>x.id!==id); });
      if(p.op==="up"){ const row=p.row; (map[row.contato_id]=map[row.contato_id]||[]).push({id:row.id,contato_id:row.contato_id,vendedor:row.vendedor,nome:row.nome||"",telefone:row.telefone||"",observacao:row.observacao||""}); }
    });
    indicados=map; salvarIndLocal();
    if(!telaImport) render();
  }catch(e){ /* sem rede: mantém cache */ }
}

function exportCSV(){

  const rows=arr.map(k=>{ const r=reg(k.id); const at=r.atualizado?fmtData(r.atualizado):""; const vals=[k.matricula,nomeProper(k.nome),k.telefones.map(fmtTel).join(" | "),k.cidade||"",k.lista,k.vezes||"",k.data_entrada||"",k.data_eliminacao||"",(ST[r.status]||{}).label||"",(r.nota||"").replace(/\n/g," "),at];
    if(ehIndic) vals.push(indDe(k.id).map(ind=>nomeProper(ind.nome)+(ind.telefone?" ("+fmtTel(ind.telefone)+")":"")+(ind.observacao?" ["+ind.observacao+"]":"")).join(" ; "));
    return vals.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","); });
  const csv="\uFEFF"+[head.join(","),...rows].join("\n");

// ---------------- RELATÓRIO PDF ----------------
function gerarPDF(){
  if(!window.jspdf||!window.jspdf.jsPDF){ toast("Carregando gerador… tente de novo em instantes"); return; }
  const slug=vendAtual, arr=contatosCamp(slug), nomeVend=VMAP[slug]||slug, s=statsDe(slug,arr);
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF({unit:"pt",format:"a4"});
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
  const dataStr=dataExtenso();

  // ----- capa -----
  doc.setFont("helvetica","bold"); doc.setFontSize(26); doc.setTextColor(28,27,25);
  doc.text(CAMPANHAS[campanhaAtual].relTitulo, W/2, 110, {align:"center"});
  doc.setFont("helvetica","normal"); doc.setFontSize(12); doc.setTextColor(120,117,107);
  doc.text(CLUBE, W/2, 134, {align:"center"});
  doc.setFontSize(10); doc.text(dataStr, W/2, 152, {align:"center"});

  const order=REP_ORDER;
  const cols=2, boxW=200, boxH=78, gapX=24, gapY=18;
  const totalW=cols*boxW+(cols-1)*gapX; let bx0=(W-totalW)/2, by0=210;
  order.forEach((id,i)=>{ const col=i%cols, rowi=Math.floor(i/cols); const x=bx0+col*(boxW+gapX), y=by0+rowi*(boxH+gapY); const st=ST[id];
    doc.setDrawColor(236,232,224); doc.setFillColor(255,255,255); doc.roundedRect(x,y,boxW,boxH,8,8,"FD");
    doc.setFillColor(...hexRGB(st.dot)); doc.rect(x,y,5,boxH,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize?doc.setFontSize(30):0; doc.setTextColor(28,27,25);
    doc.text(String(s[id]), x+20, y+44);
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(...hexRGB(st.fg));
    doc.text(st.label.toUpperCase(), x+20, y+62);
  });
  const afterBoxes=by0+Math.ceil(order.length/cols)*(boxH+gapY)+10;
  doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.setTextColor(28,27,25);
  doc.text("Total de contatos trabalhados: "+s.total, W/2, afterBoxes+14, {align:"center"});
  doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(168,137,92);
  doc.text(nomeVend, W/2, H-54, {align:"center"});

  // ----- seções -----
  let current=null;
  order.forEach(stId=>{
    const items=arr.filter(k=>reg(k.id).status===stId);
    if(!items.length) return;
    current={stId, count:items.length};
    doc.addPage();
    const body=items.map((k,i)=>[ String(i+1), nomeProper(k.nome), listaCurta(k.lista), telReport(k), (reg(k.id).nota||"") ]);
    doc.autoTable({
      head:[["#","Nome","Lista","Telefone","Observação"]],
      body,
      startY:96,
      margin:{top:90,left:40,right:40,bottom:48},
      styles:{font:"helvetica",fontSize:8.5,cellPadding:4,valign:"top",textColor:[40,40,38],lineColor:[236,232,224],lineWidth:0.4},
      headStyles:{fillColor:[28,27,25],textColor:255,fontSize:8.5,halign:"left"},
      alternateRowStyles:{fillColor:[250,248,244]},
      columnStyles:{0:{cellWidth:24,halign:"right"},1:{cellWidth:150},2:{cellWidth:34,halign:"center"},3:{cellWidth:96},4:{cellWidth:"auto"}},
      didDrawPage:()=>drawSecHeader(doc,current,W)
    });
  });

  // ----- seção "PESSOAS INDICADAS" (só na campanha de indicação — é o entregável) -----
  if(campanhaAtual==="indicacao"){
    const linhas=[];

async function migrarDados(){
  const log=(m)=>{ const el=document.getElementById("miglog"); if(el){ el.textContent+=m+"\n"; el.scrollTop=el.scrollHeight; } };
  const btn=document.getElementById("migbtn");
  if(btn){ btn.disabled=true; btn.textContent="Migrando…"; }
  if(!sb){ log("🛑 ERRO: Supabase não conectado."); if(btn){btn.disabled=false;btn.textContent="Tentar de novo";} return; }
  try{
    log("Enviando vendedores…");
    const vrows=DADOS.vendedores.map(v=>({slug:v.slug,nome:v.nome}));
    const {error:ev}=await sb.from("vendedores").upsert(vrows);
    if(ev) throw ev;
    log("✓ "+vrows.length+" vendedores enviados.");
    const resumo={};
    for(const slug of Object.keys(DADOS.contatos)){
      const arr=DADOS.contatos[slug]||[];
      const rows=arr.map(k=>({
        id:k.id, vendedor:slug, matricula:k.matricula||null, nome:k.nome||null,
        telefones:(k.telefones||[]).join(" | "), email:k.email||null, cidade:k.cidade||null,
        vezes:k.vezes||null, data_entrada:k.data_entrada||null, data_eliminacao:k.data_eliminacao||null,
        lista:k.lista||null
      }));
      log("Enviando contatos de "+(VMAP[slug]||slug)+" ("+rows.length+")…");
      for(let i=0;i<rows.length;i+=200){
        const {error:ec}=await sb.from("contatos").upsert(rows.slice(i,i+200));
        if(ec) throw ec;
      }
      resumo[slug]=rows.length;
      log("✓ "+(VMAP[slug]||slug)+": "+rows.length+" contatos.");
    }
    log("\nConferindo no banco…");
    let tudoOk=true;
    for(const slug of Object.keys(resumo)){
      const {count,error:ce}=await sb.from("contatos").select("id",{count:"exact",head:true}).eq("vendedor",slug);
      if(ce) throw ce;
      const ok=count===resumo[slug]; if(!ok)tudoOk=false;
      log("  "+(VMAP[slug]||slug)+": "+count+" no banco (esperado "+resumo[slug]+") "+(ok?"✓":"⚠ DIFERENTE"));
    }
    log(tudoOk?"\n✅ Migração concluída e conferida. Pode fechar esta tela.":"\n⚠ Migração terminou, mas alguma contagem ficou diferente. Me avise.");
    if(btn){ btn.textContent="Concluído"; }
  }catch(e){
    log("\n🛑 ERRO: "+(e.message||JSON.stringify(e)));
    if(btn){ btn.disabled=false; btn.textContent="Tentar de novo"; }
  }
}

function loadScriptOnce(src){
  return new Promise((res,rej)=>{
    if([...document.scripts].some(s=>s.src===src)) return res();
    const s=document.createElement("script"); s.src=src;
    s.onload=()=>res(); s.onerror=()=>rej(new Error("Não consegui carregar uma biblioteca da internet. Verifique a conexão."));
    document.head.appendChild(s);
  });
}
function slugify(s){ return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim(); }
function vendSlugFromNome(nome){ return slugify(nome).replace(/\s+/g,"")||"vendedor"; }
function slugLista(label){ const m=/lista\s*0*(\d+)/i.exec(label); if(m) return "l"+m[1]; if(/digitad/i.test(label)) return "dig"; const s=slugify(label).replace(/\s+/g,""); return s.slice(0,12)||"lista"; }

// ---- parsers (porte fiel do parser validado em Python — seção 6 do briefing) ----
const RE_DATE="(?:\\d{2}/\\d{2}/\\d{4}|\\d{4}-\\d{2}-\\d{2}(?:\\s+00:00:00)?)";
const RE_PHONE=/((?:\d{6,13})(?:\s*\/\s*\d{1,13})*)/;
const RE_TABELA=new RegExp("^\\s*("+RE_DATE+")\\s+("+RE_DATE+")\\s+(.*)$");
const RE_DUASDATAS=new RegExp("^\\s*"+RE_DATE+"\\s+"+RE_DATE+"\\s+");
function fixdate(d){ if(d&&d.indexOf("-")>=0){ const p=d.split(/\s+/)[0].split("-"); return p[2]+"/"+p[1]+"/"+p[0]; } return d; }
function cleanPhones(raw){ return String(raw||"").split("/").map(p=>p.replace(/\D/g,"")).filter(p=>p.length>=10); }
function stripEdgeSlash(s){ return String(s||"").replace(/^[\s/]+|[\s/]+$/g,""); }
function tiraPontoFinal(n){ return String(n||"").trim().replace(/\.+\s*$/,"").trim(); }

function parseLinhaTabela(line){
  line=line.replace(/^A{3,}\s*/,"").replace(/\s*A{3,}$/,"");           // tira marcadores AAAAAA
  const m=RE_TABELA.exec(line); if(!m) return null;
  const de=m[1], dl=m[2]; let rest=m[3].trim();
  let matricula=null;
  const mm=/^(\d{1,6})\s*([A-Za-zÀ-Úà-ú].*)$/.exec(rest);              // matrícula grudada no nome
  if(mm){ matricula=mm[1]; rest=mm[2].trim(); }
  let nome, phones, tail;
  const pm=RE_PHONE.exec(rest);
  if(pm){ nome=rest.slice(0,pm.index).trim(); phones=cleanPhones(pm[1]); tail=rest.slice(pm.index+pm[0].length).trim(); }
  else { nome=rest.trim(); phones=[]; tail=""; }
  let qtd="",cidade="",email="";
  const qm=/(\d+)\s*x/.exec(tail); if(qm) qtd=qm[1]+"x";
  const resto=stripEdgeSlash(tail.replace(/\d+\s*x/g,"").trim());
  if(resto.indexOf("@")>=0) email=stripEdgeSlash(resto.replace(/^\d+\s*/,"")); else cidade=resto;
  return { matricula, nome:tiraPontoFinal(nome), telefones:phones, email, cidade, vezes:qtd, data_entrada:fixdate(de), data_eliminacao:fixdate(dl) };
}
function parseLinhaTexto(line){
  // formato A: "matrícula - nome - telefone(s)"
  let m=/^\s*(\d+)\s*-\s*(.+?)\s*-\s*([\d/\s]+)\s*$/.exec(line);
  if(m) return { matricula:m[1], nome:tiraPontoFinal(m[2]), telefones:cleanPhones(m[3]), email:"", cidade:"", vezes:"", data_entrada:"", data_eliminacao:"" };
  // formato B: "nome - telefone(s)" (sem matrícula — gerada depois em parseTexto)
  m=/^\s*(.+?)\s*-\s*([\d/\s]+)\s*$/.exec(line);
  if(m && cleanPhones(m[2]).length) return { matricula:null, nome:tiraPontoFinal(m[1]), telefones:cleanPhones(m[2]), email:"", cidade:"", vezes:"", data_entrada:"", data_eliminacao:"" };
  return null;
}
function ehCabecalho(line){ if(RE_DUASDATAS.test(line)) return false; return /data_entrada|data_elimina|telefone|matr[ií]cula/i.test(line); }
function parseLinha(line){
  if(!line||!line.trim()) return null;
  line=line.replace(/^A{3,}\s*/,"").replace(/\s*A{3,}$/,"");   // tira AAAAAA antes de detectar o formato
  if(!line.trim()) return null;
  if(ehCabecalho(line)) return null;
  if(RE_DUASDATAS.test(line)) return parseLinhaTabela(line);
  if(line.indexOf("-")>=0) return parseLinhaTexto(line);   // tenta "matrícula - nome - tel" e "nome - tel"
  return null;
}
function parseTexto(txt){
  const linhas=String(txt||"").split(/\r?\n/).map(parseLinha).filter(Boolean);
  let seq=0;
  linhas.forEach(c=>{ if(!c.matricula){ c.matricula="auto"+(++seq); } });   // gera matrícula p/ linhas "nome - telefone"
  return linhas;
}

// ---- planilha (Excel/CSV) por cabeçalhos, com queda para o parser de linha ----
const HEADER_MAP=[
  ["data_entrada",["data_entrada","data entrada","dataentrada","entrada","data de entrada","admissao"]],
  ["data_eliminacao",["data_eliminacao","data eliminacao","data eliminacao","eliminacao","data de eliminacao","saida","exclusao","eliminado em"]],
  ["matricula",["matricula","mat","registro","inscricao"]],
  ["nome",["nome","cliente","nome cliente","nome do cliente","socio"]],
  ["telefone",["telefone","telefones","tel","celular","cel","fone","contato","whatsapp","whats"]],
  ["email",["email","e mail","correio"]],
  ["qtd",["qtd","qtde","vezes","quantidade","eliminado","eliminados","eliminacoes","reativacoes"]],
  ["cidade",["cidade","municipio","localidade"]],
];
function normHeader(h){ return slugify(h).replace(/\s+/g," ").trim(); }
function mapearColunas(headerRow){
  const map={};
  headerRow.forEach((h,i)=>{ const nh=normHeader(h); for(const [campo,vars] of HEADER_MAP){ if(map[campo]===undefined && vars.some(v=>normHeader(v)===nh)){ map[campo]=i; break; } } });
  return map;
}
function normalizaQtd(v){ v=String(v||"").trim(); if(!v) return ""; if(/x/i.test(v)) return v.replace(/\s/g,"").toLowerCase(); const d=v.replace(/\D/g,""); return d?d+"x":""; }
function normalizaData(v){
  v=String(v||"").trim(); if(!v) return "";
  if(/^\d{4}-\d{2}-\d{2}/.test(v)){ const p=v.slice(0,10).split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
  const m=/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/.exec(v); if(m){ let y=m[3]; if(y.length===2) y="20"+y; return m[1].padStart(2,"0")+"/"+m[2].padStart(2,"0")+"/"+y; }
  return v;
}
function linhaPlanilha(row,map){
  const get=(c)=> map[c]!==undefined ? String(row[map[c]]==null?"":row[map[c]]).trim() : "";
  return { matricula:get("matricula")||null, nome:tiraPontoFinal(get("nome")), telefones:cleanPhones(get("telefone")),
    email:get("email"), cidade:get("cidade"), vezes:normalizaQtd(get("qtd")),
    data_entrada:normalizaData(get("data_entrada")), data_eliminacao:normalizaData(get("data_eliminacao")) };
}
function rowsToContatos(rows){
  rows=(rows||[]).filter(r=>r&&r.some(c=>String(c==null?"":c).trim()!==""));
  if(!rows.length) return [];
  const map=mapearColunas(rows[0].map(c=>String(c==null?"":c)));
  const temHeader=(map.nome!==undefined||map.matricula!==undefined)&&map.telefone!==undefined;
  if(temHeader) return rows.slice(1).map(r=>linhaPlanilha(r,map)).filter(c=>c.nome||c.matricula||c.telefones.length);
  return rows.map(r=>parseLinha(r.map(c=>String(c==null?"":c)).join(" "))).filter(Boolean);   // queda: trata como texto
}
async function lerArquivoPlanilha(file){
  const nome=(file.name||"").toLowerCase();
  if(nome.endsWith(".csv")){
    await loadScriptOnce("https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js");
    const res=Papa.parse(await file.text(),{skipEmptyLines:true});
    return rowsToContatos(res.data);
  }
  await loadScriptOnce("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js");
  const wb=XLSX.read(await file.arrayBuffer(),{type:"array",cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return rowsToContatos(XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:"dd/mm/yyyy",defval:""}));
}
async function lerPDF(file){
  await loadScriptOnce("https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js");
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.worker.min.js";
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  const linhas=[];
  for(let p=1;p<=pdf.numPages;p++){
    const tc=await (await pdf.getPage(p)).getTextContent();
    const porY={};
    tc.items.forEach(it=>{ const y=Math.round(it.transform[5]); (porY[y]=porY[y]||[]).push({s:it.str,x:it.transform[4]}); });
    Object.keys(porY).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const linha=porY[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(" ").replace(/\s+/g," ").trim();
      if(linha) linhas.push(linha);
    });
  }
  return linhas.map(parseLinha).filter(Boolean);
}

  IMP={ modo:"planilha", contatos:[] };
  document.getElementById("app").innerHTML=
  '<div class="picker" style="max-width:620px">'+
    '<div class="eyebrow">Gestão</div>'+
    '<h1>Importar lista</h1>'+
    '<p class="clube">Leia uma lista de <b>Excel/CSV</b>, <b>PDF</b> ou <b>texto colado</b>. Você confere tudo numa pré-visualização antes de salvar — nada é gravado sem você confirmar.</p>'+
    '<div class="imp-tabs">'+
      '<button class="imp-tab on" data-imp="tab" data-tab="planilha">Excel / CSV</button>'+
      '<button class="imp-tab" data-imp="tab" data-tab="pdf">PDF</button>'+
      '<button class="imp-tab" data-imp="tab" data-tab="colar">Colar texto</button>'+
    '</div>'+
    '<div id="imp-in-planilha" class="imp-in"><input type="file" id="imp-file-planilha" accept=".xlsx,.xls,.csv"></div>'+
    '<div id="imp-in-pdf" class="imp-in" style="display:none"><input type="file" id="imp-file-pdf" accept="application/pdf,.pdf"></div>'+
    '<div id="imp-in-colar" class="imp-in" style="display:none"><textarea id="imp-textarea" rows="7" placeholder="Cole aqui as linhas. Aceita os dois formatos:\n6883 - JOÃO DA SILVA - 91999998888 / 91888887777\nMARIA SOUSA - 91977776666   (sem matrícula — gerada automaticamente)"></textarea><div style="font-size:11.5px;color:#9a958b;margin-top:6px">Um contato por linha. Formatos aceitos: <b>matrícula - nome - telefone(s)</b> ou <b>nome - telefone(s)</b>. Vários telefones separados por “/”.</div></div>'+
    '<button id="imp-ler" class="b-rep imp-btn" data-imp="ler" style="margin-top:12px">Ler e pré-visualizar</button>'+
    '<div id="imp-preview" style="margin-top:16px"></div>'+
    '<a href="'+location.pathname+'" class="csvlink" data-imp="voltar" style="margin-top:16px">← Voltar</a>'+
  '</div>';
}
function impTab(tab){
  IMP.modo=tab;
  ["planilha","pdf","colar"].forEach(t=>{ const d=document.getElementById("imp-in-"+t); if(d) d.style.display=(t===tab?"":"none"); });
  document.querySelectorAll(".imp-tab").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  document.getElementById("imp-preview").innerHTML="";
}
async function impLer(){
  const btn=document.getElementById("imp-ler"); const old=btn.textContent; btn.disabled=true; btn.textContent="Lendo…";
  const prev=document.getElementById("imp-preview"); prev.innerHTML="";
  try{
    let contatos=[];
    if(IMP.modo==="colar"){ contatos=parseTexto(document.getElementById("imp-textarea").value); }
    else if(IMP.modo==="planilha"){ const f=document.getElementById("imp-file-planilha").files[0]; if(!f) throw new Error("Escolha um arquivo .xlsx, .xls ou .csv."); contatos=await lerArquivoPlanilha(f); }
    else { const f=document.getElementById("imp-file-pdf").files[0]; if(!f) throw new Error("Escolha um arquivo PDF."); contatos=await lerPDF(f); }
    IMP.contatos=contatos;
    renderPreview();
  }catch(e){ prev.innerHTML='<div class="imp-warn">🛑 '+esc(e.message||"Não consegui ler o arquivo.")+'</div>'; }
  finally{ btn.disabled=false; btn.textContent=old; }
}
function renderPreview(){
  const prev=document.getElementById("imp-preview");
  const cs=IMP.contatos;
  if(!cs.length){ prev.innerHTML='<div class="imp-warn">Não encontrei nenhum contato nesse conteúdo. Confira o formato e tente de novo.</div>'; return; }
  const semTel=cs.filter(c=>!c.telefones.length).length;
  const foraPadrao=cs.filter(c=>c.telefones.length&&c.telefones.every(t=>digits(t).length!==11)).length;
  const cont={}; cs.forEach(c=>{ if(c.matricula){ cont[c.matricula]=(cont[c.matricula]||0)+1; } });
  const repetidas=Object.keys(cont).filter(m=>cont[m]>1);
  let avisos="";
  if(semTel) avisos+='<div class="imp-warn">⚠ '+semTel+' contato(s) sem telefone válido.</div>';
  if(foraPadrao) avisos+='<div class="imp-warn">⚠ '+foraPadrao+' contato(s) com número fora do padrão de 11 dígitos (marcados como "conferir número").</div>';
  if(repetidas.length) avisos+='<div class="imp-warn">⚠ '+repetidas.length+' matrícula(s) repetida(s) nesta lista: '+esc(repetidas.slice(0,8).join(", "))+(repetidas.length>8?"…":"")+'</div>';
  if(!avisos) avisos='<div class="imp-ok">✓ Nenhum aviso. Telefones e matrículas parecem ok.</div>';
  const amostra=cs.slice(0,12).map((c,i)=>'<tr><td>'+(i+1)+'</td><td title="'+esc(c.matricula||"")+'">'+esc(c.matricula||"—")+'</td><td title="'+esc(c.nome||"")+'">'+esc(nomeProper(c.nome||"—"))+'</td><td title="'+esc(c.telefones.join(" | "))+'">'+esc(c.telefones.map(fmtTel).join(" | ")||"—")+'</td><td title="'+esc(c.email||c.cidade||"")+'">'+esc(c.email||c.cidade||"—")+'</td><td>'+esc(c.vezes||"")+'</td></tr>').join("");
  const vendOpts=VENDEDORES.map(v=>'<option value="'+esc(v.slug)+'">'+esc(v.nome)+'</option>').join("");
  prev.innerHTML=
  '<div class="imp-card">'+
    '<div style="font-weight:700;font-size:15px">Li '+cs.length+' contato(s).</div>'+
    avisos+
    '<div style="overflow-x:auto"><table class="imp-tbl"><colgroup><col style="width:24px"><col style="width:62px"><col style="width:34%"><col style="width:30%"><col style="width:24%"><col style="width:36px"></colgroup>'+
    '<thead><tr><th>#</th><th>Matríc.</th><th>Nome</th><th>Telefone</th><th>Email/Cidade</th><th>Vez</th></tr></thead><tbody>'+amostra+'</tbody></table></div>'+
    (cs.length>12?'<div style="font-size:11.5px;color:#9a958b;margin-top:6px">…e mais '+(cs.length-12)+' contato(s).</div>':"")+
  '</div>'+
  '<div class="imp-card">'+
    '<div style="font-weight:700;font-size:15px;margin-bottom:6px">Para onde vai esta lista?</div>'+
    '<div class="imp-field"><label>Vendedor</label><select id="imp-vend" data-imp="vendsel">'+vendOpts+'<option value="__novo__">➕ Criar vendedor novo…</option></select></div>'+
    '<div id="imp-novo" style="display:none">'+
      '<div class="imp-field"><label>Nome do novo vendedor</label><input id="imp-vend-nome" data-imp="vendnome" placeholder="Ex.: Maria Santos"></div>'+
      '<div class="imp-field"><label>Apelido/link (slug — sem acento, sem espaço)</label><input id="imp-vend-slug" data-imp="slugedit" placeholder="ex.: maria"></div>'+
    '</div>'+
    '<div class="imp-field"><label>Tipo de campanha</label><div class="imp-radio">'+
      '<label><input type="radio" name="imp-camp" value="reativacao" checked> Reativação</label>'+
      '<label><input type="radio" name="imp-camp" value="indicacao"> Indicação</label>'+
    '</div></div>'+
    '<div class="imp-field"><label>Rótulo da lista</label><input id="imp-lista" list="imp-listas" value="Lista 1"><datalist id="imp-listas"><option>Lista 1</option><option>Lista 2</option><option>Lista 3</option><option>Digitados</option></datalist></div>'+
    '<div class="imp-field"><label>Como gravar</label><div class="imp-radio">'+
      '<label><input type="radio" name="imp-modo" value="add" checked> Adicionar à lista do vendedor</label>'+
      '<label><input type="radio" name="imp-modo" value="replace"> Substituir tudo do vendedor</label>'+
    '</div></div>'+
    '<button id="imp-salvar" class="b-rep imp-btn" data-imp="salvar" style="margin-top:14px">Confirmar e salvar</button>'+
    '<div id="imp-result" style="margin-top:10px"></div>'+
  '</div>';
}
function impToggleNovo(val){ const d=document.getElementById("imp-novo"); if(d) d.style.display=(val==="__novo__"?"":"none"); }

async function idsDoVendedor(slug){
  const out=new Set(); let from=0; const size=1000;
  for(;;){ const {data,error}=await sb.from("contatos").select("id").eq("vendedor",slug).range(from,from+size-1); if(error) throw error; (data||[]).forEach(r=>out.add(r.id)); if(!data||data.length<size) break; from+=size; }
  return out;
}
async function impSalvar(){
  const res=document.getElementById("imp-result");
  const log=(m,cls)=>{ res.innerHTML+='<div class="'+(cls||"imp-ok")+'">'+esc(m)+'</div>'; };
  const btn=document.getElementById("imp-salvar");
  res.innerHTML="";
  try{
    if(!sb) throw new Error("Banco de dados não conectado.");
    if(!IMP.contatos.length) throw new Error("Nada para salvar.");
    const sel=document.getElementById("imp-vend").value;
    let slug, nome, novo=false;
    if(sel==="__novo__"){
      nome=document.getElementById("imp-vend-nome").value.trim();
      slug=vendSlugFromNome(document.getElementById("imp-vend-slug").value||nome);
      if(!nome) throw new Error("Digite o nome do novo vendedor.");
      if(!slug) throw new Error("Defina o apelido/link (slug) do vendedor.");
      if(VMAP[slug]) throw new Error('Já existe um vendedor com o apelido "'+slug+'". Escolha outro, ou selecione-o na lista para adicionar à lista dele.');
      novo=true;
    } else { slug=sel; nome=VMAP[slug]||sel; }
    const label=(document.getElementById("imp-lista").value||"").trim()||"Lista 1";
    const modo=(document.querySelector('input[name="imp-modo"]:checked')||{}).value||"add";
    const camp=(document.querySelector('input[name="imp-camp"]:checked')||{}).value||"reativacao";
    const campLabel=(CAMPANHAS[camp]||CAMPANHAS.reativacao).label;

    btn.disabled=true; btn.textContent="Salvando…";

    if(modo==="replace"){
      const {count}=await sb.from("contatos").select("id",{count:"exact",head:true}).eq("vendedor",slug).eq("campanha",camp);
      const ok=window.confirm("ATENÇÃO — SUBSTITUIR\n\nIsto vai APAGAR os "+(count||0)+" contato(s) atuais de "+(nome||slug)+" na campanha \""+campLabel+"\" e colocar "+IMP.contatos.length+" no lugar.\n\n(As listas da outra campanha NÃO são afetadas.)\n\nO progresso (status e anotações) dos contatos antigos desta campanha pode ser perdido.\n\nTem certeza que deseja substituir?");
      if(!ok) throw new Error("Cancelado. Nada foi alterado.");
    }

    if(novo||!VMAP[slug]){ const {error}=await sb.from("vendedores").upsert({slug,nome}); if(error) throw error; }

    // no "substituir", apaga só a campanha importada ANTES de gerar os ids
    if(modo==="replace"){ const {error}=await sb.from("contatos").delete().eq("vendedor",slug).eq("campanha",camp); if(error) throw error; log("Contatos antigos desta campanha removidos."); }

    const sl=slugLista(label);
    // semeia com TODOS os ids que restam do vendedor (as duas campanhas) para nunca colidir/sobrescrever
    const used=new Set(); (await idsDoVendedor(slug)).forEach(x=>used.add(x));
    const rows=IMP.contatos.map(c=>{
      const base=slug+":"+(c.matricula||"sem")+":"+sl;
      let id=base, n=1; while(used.has(id)){ n++; id=base+":"+n; } used.add(id);
      return { id, vendedor:slug, matricula:c.matricula||null, nome:c.nome||null,
        telefones:(c.telefones||[]).join(" | "), email:c.email||null, cidade:c.cidade||null,
        vezes:c.vezes||null, data_entrada:c.data_entrada||null, data_eliminacao:c.data_eliminacao||null, lista:label, campanha:camp };
    });

    for(let i=0;i<rows.length;i+=200){ const {error}=await sb.from("contatos").upsert(rows.slice(i,i+200)); if(error) throw error; }
    log('✅ '+rows.length+' contato(s) salvos para '+(nome||slug)+' — campanha "'+campLabel+'", lista "'+label+'".');
    await carregarDoBanco();
    await carregarIndicados();
    log("Pronto! A lista já está disponível no app.");
    btn.textContent="Concluído";
    res.innerHTML+='<button class="b-rep imp-btn" data-imp="goto" data-slug="'+esc(slug)+'" style="margin-top:10px">Abrir a lista de '+esc(nome||slug)+'</button>';
  }catch(e){
    log("🛑 "+(e.message||"Erro ao salvar."),"imp-warn");
    if(btn){ btn.disabled=false; btn.textContent="Confirmar e salvar"; }
  }
}

// eventos do importador (registrados uma vez)
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-imp]"); if(!el) return;
  const a=el.dataset.imp;
  if(a==="open"){ renderImport(); }
  else if(a==="tab"){ impTab(el.dataset.tab); }
  else if(a==="ler"){ e.preventDefault(); impLer(); }
  else if(a==="salvar"){ e.preventDefault(); impSalvar(); }
  else if(a==="voltar"){ e.preventDefault(); telaImport=false; vendAtual=null; try{history.replaceState(null,"",location.pathname);}catch(_){ } render(); }
  else if(a==="goto"){ telaImport=false; vendAtual=el.dataset.slug; try{history.replaceState(null,"",location.pathname+"?v="+vendAtual);}catch(_){ } filtroStatus="novo"; busca=""; render(); }
});
document.addEventListener("change",e=>{ const el=e.target.closest("[data-imp]"); if(!el) return; if(el.dataset.imp==="vendsel") impToggleNovo(el.value); });
document.addEventListener("input",e=>{ const el=e.target.closest("[data-imp]"); if(!el) return;
  if(el.dataset.imp==="vendnome"){ const s=document.getElementById("imp-vend-slug"); if(s&&!s.dataset.touched) s.value=vendSlugFromNome(el.value); }
  else if(el.dataset.imp==="slugedit"){ el.dataset.touched="1"; }
});

async function init(){
  const p=new URLSearchParams(location.search);
  if(p.get("migrar")==="1"){ renderMigracao(); return; }
  const abrirImport=p.get("importar")==="1";
  const v=p.get("v");
  if(v&&VMAP[v]){ vendAtual=v; definirCampanhaPadrao(v); }
  render();                       // pinta já com o cache/semente (rápido, funciona offline)
  if(sb){
    await carregarDoBanco();      // atualiza a partir do banco (fonte da verdade)
    if(v&&VMAP[v]&&!vendAtual) vendAtual=v;   // caso seja vendedor novo, só conhecido após o banco
    if(vendAtual) definirCampanhaPadrao(vendAtual);   // após o banco, a campanha do vendedor pode ter mudado
    if(abrirImport){ renderImport(); } else { render(); }
    pullRemote();
    carregarIndicados();
    setInterval(()=>{ if(Object.keys(pending).length)flushPending(); if(Object.keys(indPending).length)flushIndPending(); },15000);
  } else if(abrirImport){ renderImport(); }
}
init();

</script>
